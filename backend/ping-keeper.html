<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HF Space Ping Keeper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .status-card.success {
            border-left-color: #28a745;
            background: #d4edda;
        }

        .status-card.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }

        .status-card.warning {
            border-left-color: #ffc107;
            background: #fff3cd;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-start {
            background: #28a745;
            color: white;
        }

        .btn-start:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-stop {
            background: #dc3545;
            color: white;
        }

        .btn-stop:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 4px;
        }

        .log-entry.success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .log-entry.error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }

        .log-entry.warning {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
        }

        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .inactive .pulse {
            background: #dc3545;
            animation: none;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 HF Space Ping Keeper</h1>
        <p class="subtitle">Keep your Hugging Face Space awake 24/7</p>

        <div class="status-card" id="statusCard">
            <div class="inactive">
                <span class="pulse"></span>
                <strong>Status:</strong> <span id="statusText">Inactive</span>
            </div>
        </div>

        <div class="controls">
            <div class="input-group">
                <label>Space URL</label>
                <input type="text" id="spaceUrl" value="https://gdfetcher789-gdfetcher.hf.space" />
            </div>
            <div class="input-group">
                <label>Ping Interval (seconds)</label>
                <input type="number" id="pingInterval" value="240" min="60" max="600" />
            </div>
        </div>

        <div class="button-group">
            <button class="btn-start" id="startBtn" onclick="startPinging()">▶ Start Pinging</button>
            <button class="btn-stop" id="stopBtn" onclick="stopPinging()" disabled>⏹ Stop</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="totalPings">0</div>
                <div class="stat-label">Total Pings</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="successCount">0</div>
                <div class="stat-label">Successful</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="errorCount">0</div>
                <div class="stat-label">Failed</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="uptime">0m</div>
                <div class="stat-label">Uptime</div>
            </div>
        </div>

        <div class="log-container" id="logContainer">
            <div class="log-entry">📋 Ready to start pinging...</div>
        </div>
    </div>

    <script>
        let pingInterval = null;
        let totalPings = 0;
        let successCount = 0;
        let errorCount = 0;
        let startTime = null;

        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.textContent = `[${timestamp}] ${message}`;
            logContainer.insertBefore(logEntry, logContainer.firstChild);
            
            // Keep only last 100 logs
            while (logContainer.children.length > 100) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        function updateStats() {
            document.getElementById('totalPings').textContent = totalPings;
            document.getElementById('successCount').textContent = successCount;
            document.getElementById('errorCount').textContent = errorCount;
            
            if (startTime) {
                const minutes = Math.floor((Date.now() - startTime) / 60000);
                const hours = Math.floor(minutes / 60);
                document.getElementById('uptime').textContent = 
                    hours > 0 ? `${hours}h ${minutes % 60}m` : `${minutes}m`;
            }
        }

        async function ping() {
            const spaceUrl = document.getElementById('spaceUrl').value.trim();
            
            if (!spaceUrl) {
                addLog('❌ Please enter a valid Space URL', 'error');
                return;
            }

            try {
                const pingUrl = `${spaceUrl}/ping`;
                const response = await fetch(pingUrl, { 
                    method: 'GET',
                    mode: 'no-cors' // Bypass CORS for simple ping
                });

                totalPings++;
                successCount++;
                
                addLog(`✅ Ping #${totalPings} - Space is awake`, 'success');
                updateStats();

                // Update status card
                const statusCard = document.getElementById('statusCard');
                statusCard.className = 'status-card success';
                document.getElementById('statusText').textContent = 'Active & Pinging';

            } catch (error) {
                totalPings++;
                errorCount++;
                
                addLog(`❌ Ping #${totalPings} failed: ${error.message}`, 'error');
                updateStats();

                // Update status card
                const statusCard = document.getElementById('statusCard');
                statusCard.className = 'status-card error';
                document.getElementById('statusText').textContent = 'Connection Error';
            }
        }

        function startPinging() {
            const intervalSeconds = parseInt(document.getElementById('pingInterval').value);
            const intervalMs = intervalSeconds * 1000;

            if (intervalMs < 60000) {
                addLog('⚠️ Interval must be at least 60 seconds', 'warning');
                return;
            }

            // Initial ping
            ping();

            // Set interval
            pingInterval = setInterval(ping, intervalMs);
            startTime = Date.now();

            // Update UI
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;

            const statusCard = document.getElementById('statusCard');
            statusCard.className = 'status-card success';
            document.getElementById('statusText').innerHTML = 
                '<span class="pulse"></span> Active & Pinging';

            addLog(`🚀 Started pinging every ${intervalSeconds} seconds`, 'success');
        }

        function stopPinging() {
            if (pingInterval) {
                clearInterval(pingInterval);
                pingInterval = null;
            }

            // Update UI
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;

            const statusCard = document.getElementById('statusCard');
            statusCard.className = 'status-card';
            document.getElementById('statusText').textContent = 'Stopped';

            addLog('⏹ Pinging stopped', 'warning');
        }

        // Auto-start if URL is set
        window.addEventListener('load', () => {
            addLog('💡 Click "Start Pinging" to begin', 'info');
        });
    </script>
</body>
</html>
